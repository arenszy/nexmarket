services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: shopeeclone-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: shopeeclone-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: shopeeclone-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromService:
          name: shopeeclone-frontend
          type: web
          property: host
      # Set these manually in Render dashboard:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MIDTRANS_SERVER_KEY
        sync: false
      - key: MIDTRANS_CLIENT_KEY
        sync: false
      - key: MIDTRANS_IS_PRODUCTION
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: shopeeclone-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: shopeeclone-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_MIDTRANS_CLIENT_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: shopeeclone-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - name: shopeeclone-db
    plan: free
    databaseName: shopeeclone
    user: shopeeclone
